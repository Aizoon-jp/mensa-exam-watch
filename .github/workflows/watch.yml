name: mensa-exam-watch

on:
  schedule:
    # 5分おき（GitHub Actions の最短間隔）。混雑時は数分遅延することがあります。
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      test_notify:
        description: 'テスト通知を送る (1 で送信)'
        required: false
        default: '0'

permissions:
  contents: write

concurrency:
  group: mensa-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run watcher
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
          TEST_NOTIFY: ${{ github.event.inputs.test_notify }}
        run: python3 watcher.py

      - name: Commit state if changed
        run: |
          if ! git diff --quiet -- state.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update mensa exam state [skip ci]"
            git push
          else
            echo "state.json に変更なし"
          fi
